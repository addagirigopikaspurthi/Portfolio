<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addagiri Spoorthi — an explorable graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#090C16;--panel:#0F1526;--line:#233054;
    --text:#E7EBF6;--muted:#8892AE;
    --explore:#57E1C9;--path:#FF9E4A;--root:#FFC24A;--gh:#B07BFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--void);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1200px 700px at 70% -10%,rgba(87,225,201,.06),transparent 60%),radial-gradient(1000px 700px at 0% 110%,rgba(255,158,74,.06),transparent 60%)}
  ::selection{background:var(--path);color:var(--void)}

  .top{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px}
  .brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
  .brand .bdot{width:11px;height:11px;border-radius:50%;background:var(--root);box-shadow:0 0 14px var(--root);animation:bp 2.6s infinite}
  @keyframes bp{0%{box-shadow:0 0 0 0 rgba(255,194,74,.5)}70%{box-shadow:0 0 0 9px rgba(255,194,74,0)}100%{box-shadow:0 0 0 0 rgba(255,194,74,0)}}
  .top-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tbtn{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.03em;color:var(--text);background:rgba(15,21,38,.72);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:9px;padding:9px 13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
  .tbtn:hover{border-color:var(--explore);color:var(--explore)}
  .tbtn.accent{border-color:var(--path);color:var(--path)}
  .tbtn.accent:hover{background:var(--path);color:var(--void)}
  .tbtn.icon{padding:9px 11px}
  .tbtn:focus-visible{outline:2px solid var(--explore);outline-offset:2px}

  #stage{position:fixed;inset:0;z-index:10;cursor:grab}
  #stage.grabbing{cursor:grabbing}
  svg{width:100%;height:100%;display:block;touch-action:none}
  #gRoot{opacity:0;transition:opacity .8s ease}
  #gRoot.ready{opacity:1}
  .edge{stroke:var(--line);stroke-width:1.4;transition:stroke .3s,stroke-width .3s}
  .edge.lit{stroke:var(--explore);stroke-width:2.6}
  .edge.near{stroke:#3a4f86;stroke-width:1.8}
  .node{cursor:pointer}
  .node circle.core{transition:fill .3s,stroke .3s,r .2s,filter .3s}
  .node .ring{fill:transparent;stroke:transparent;stroke-width:2;transition:stroke .2s}
  .node text{font-family:'JetBrains Mono',monospace;fill:var(--text);text-anchor:middle;dominant-baseline:middle;pointer-events:none;font-size:12px;font-weight:500}
  .node.cat text{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px}
  .node.root text{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;fill:var(--void)}
  .node.dim{opacity:.24}
  .node.lit circle.core{filter:drop-shadow(0 0 12px var(--explore))}
  .node.hovered circle.core{filter:drop-shadow(0 0 10px rgba(87,225,201,.6))}
  .node:focus-visible .ring{stroke:var(--explore)}
  .gh-badge{fill:var(--gh)}

  .hint{position:fixed;left:20px;bottom:18px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);display:flex;gap:15px;flex-wrap:wrap;max-width:64vw}
  .hint b{color:var(--explore);font-weight:500}
  .legend{position:fixed;left:20px;bottom:52px;z-index:20;display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lg{width:9px;height:9px;border-radius:50%}
  .zoom{position:fixed;right:20px;bottom:18px;z-index:20;display:flex;flex-direction:column;gap:6px}
  .zoom button{width:36px;height:36px;font-size:18px;font-family:'JetBrains Mono',monospace;background:rgba(15,21,38,.72);backdrop-filter:blur(8px);color:var(--text);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:all .2s}
  .zoom button:hover{border-color:var(--explore);color:var(--explore)}

  .panel{position:fixed;top:0;right:0;height:100%;width:min(470px,93vw);z-index:50;background:linear-gradient(180deg,var(--panel),#0B1020);border-left:1px solid var(--line);box-shadow:-30px 0 80px -30px #000;transform:translateX(100%);transition:transform .42s cubic-bezier(.6,.05,.2,1);overflow-y:auto;padding:74px 32px 40px}
  .panel.open{transform:none}
  .panel-close{position:absolute;top:20px;right:22px;width:38px;height:38px;border:1px solid var(--line);background:none;color:var(--muted);border-radius:9px;cursor:pointer;font-size:15px;transition:all .2s}
  .panel-close:hover{border-color:var(--path);color:var(--path)}
  .panel-kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--explore);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .panel-kicker .k-dot{width:8px;height:8px;border-radius:50%;background:var(--explore)}
  .panel h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(25px,4vw,34px);letter-spacing:-.02em;line-height:1.04;margin-bottom:14px}
  .panel h2 .accent{color:var(--path)}
  .verified{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gh);border:1px solid #3a2f5c;background:rgba(176,123,255,.08);border-radius:100px;padding:4px 10px;margin-bottom:14px}
  .panel p{color:#C5CBDD;font-size:15px;line-height:1.6;margin-bottom:13px}
  .panel p b{color:var(--text);font-weight:600}
  .panel .when{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--path);margin-bottom:6px}
  .panel .org{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--explore);margin-bottom:14px}
  .panel ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin:4px 0 16px}
  .panel li{position:relative;padding-left:20px;color:#C5CBDD;font-size:14px;line-height:1.5}
  .panel li::before{content:"→";position:absolute;left:0;color:var(--muted)}
  .metric{display:flex;align-items:baseline;gap:10px;margin:4px 0 16px}
  .metric .n{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;color:var(--path);line-height:1}
  .metric .c{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 16px}
  .tags span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:5px 9px}
  .ghbtn{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--void);background:var(--path);border-radius:10px;padding:12px 18px;text-decoration:none;transition:all .2s;font-weight:700}
  .ghbtn:hover{transform:translateY(-2px);box-shadow:0 12px 30px -10px var(--path)}
  .ghbtn.ghost{background:none;color:var(--text);border:1px solid var(--line);font-weight:500}
  .ghbtn.ghost:hover{border-color:var(--gh);color:var(--gh);box-shadow:none}
  .facts{border:1px solid var(--line);border-radius:12px;margin-top:8px;overflow:hidden}
  .facts .r{display:flex;justify-content:space-between;gap:12px;padding:12px 15px;border-bottom:1px solid var(--line);font-size:14px}
  .facts .r:last-child{border-bottom:none}
  .facts .kk{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .facts .vv{font-weight:600}.facts .vv b{color:var(--path)}
  .clinks{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .clink{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:11px;font-family:'JetBrains Mono',monospace;font-size:13px;transition:all .2s;text-decoration:none;color:var(--text)}
  .clink:hover{border-color:var(--path);color:var(--path);transform:translateX(4px)}
  .clink .ic{color:var(--explore);width:18px;text-align:center;font-weight:700}

  .a11y{position:fixed;z-index:55;top:0;left:0;width:min(340px,90vw);height:100%;background:var(--panel);border-right:1px solid var(--line);transform:translateX(-100%);transition:transform .35s ease;padding:74px 22px 30px;overflow-y:auto}
  .a11y.open{transform:none}
  .a11y h3{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px}
  .a11y button{display:block;width:100%;text-align:left;background:none;border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 14px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .2s;font-family:'Inter',sans-serif}
  .a11y button:hover{border-color:var(--explore);color:var(--explore)}
  .scrim{position:fixed;inset:0;z-index:45;background:rgba(5,7,14,.55);opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.on{opacity:1;pointer-events:auto}

  @media (max-width:640px){
    .panel{width:100%;padding:70px 22px 40px}
    .hint{font-size:10px;gap:9px;max-width:56vw}
    .legend{font-size:9.5px;bottom:48px}
    .brand{font-size:15px}
    .tbtn{font-size:11px;padding:8px 10px}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001ms !important}.bdot{animation:none}}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><span class="bdot"></span>Spoorthi.graph</div>
  <div class="top-actions">
    <button class="tbtn" id="menuBtn" aria-label="Open section menu">☰ sections</button>
    <button class="tbtn" id="resetBtn" aria-label="Reset view">⟲ reset</button>
    <button class="tbtn accent" id="traverseBtn">▶ traverse (BFS)</button>
    <a class="tbtn icon" href="https://github.com/addagirigopikaspurthi" target="_blank" rel="noopener" aria-label="GitHub profile">⌥ GitHub</a>
    <a class="tbtn icon" href="https://www.linkedin.com/in/addagiri-spoorthi-8a6ab1334/" target="_blank" rel="noopener" aria-label="LinkedIn profile">in</a>
  </div>
</div>

<div id="stage"><svg id="graph" role="img" aria-label="Interactive node graph portfolio. Use the sections menu to open any node."></svg></div>

<div class="legend">
  <span><span class="lg" style="background:var(--root)"></span>you</span>
  <span><span class="lg" style="background:#12203c;border:1px solid var(--explore)"></span>section</span>
  <span><span class="lg" style="background:#0e1830;border:1px solid var(--path)"></span>project / node</span>
  <span><span class="lg" style="background:var(--gh)"></span>on GitHub</span>
</div>
<div class="hint">
  <span><b>drag</b> a node</span><span><b>click</b> to open</span><span><b>▶ traverse</b> = live BFS</span>
</div>
<div class="zoom">
  <button id="zin" aria-label="Zoom in">+</button>
  <button id="zout" aria-label="Zoom out">−</button>
</div>

<nav class="a11y" id="a11y" aria-label="Sections"><h3>Jump to a node</h3><div id="a11yList"></div></nav>
<div class="scrim" id="scrim"></div>

<aside class="panel" id="panel" role="dialog" aria-modal="false" aria-labelledby="panelTitle">
  <button class="panel-close" id="panelClose" aria-label="Close panel">✕</button>
  <div id="panelBody"></div>
</aside>

<script>
const REDUCE=matchMedia('(prefers-reduced-motion:reduce)').matches;
const SVG=document.getElementById('graph');
const NS='http://www.w3.org/2000/svg';
const GH='https://github.com/addagirigopikaspurthi';
const LI='https://www.linkedin.com/in/addagiri-spoorthi-8a6ab1334/';

const NODES=[
  {id:'root',label:'Spoorthi',type:'root',r:42},
  {id:'about',label:'about',type:'cat',r:30},
  {id:'exp',label:'experience',type:'cat',r:30},
  {id:'work',label:'work',type:'cat',r:30},
  {id:'stack',label:'stack',type:'cat',r:30},
  {id:'contact',label:'contact',type:'cat',r:30},
  {id:'ncmu',label:'ML research',type:'leaf',r:24},
  {id:'dsa',label:'C/C++ · DSA',type:'leaf',r:24},
  {id:'faqflow',label:'FAQFlow AI',type:'leaf',r:27,gh:true},
  {id:'nexus',label:'NexusHome',type:'leaf',r:27,gh:true},
  {id:'maze',label:'Maze Solver',type:'leaf',r:24},
  {id:'fraud',label:'Fraud ML',type:'leaf',r:24},
  {id:'power',label:'PowerMonitor',type:'leaf',r:23},
  {id:'langs',label:'languages',type:'leaf',r:22},
  {id:'tech',label:'tech',type:'leaf',r:22},
  {id:'concepts',label:'concepts',type:'leaf',r:22},
];
const LINKS=[
  ['root','about'],['root','exp'],['root','work'],['root','stack'],['root','contact'],
  ['exp','ncmu'],['exp','dsa'],
  ['work','faqflow'],['work','nexus'],['work','maze'],['work','fraud'],['work','power'],
  ['stack','langs'],['stack','tech'],['stack','concepts'],
];

const CONTENT={
  root:{k:'the graph',t:'Addagiri <span class="accent">Spoorthi</span>',h:`
    <p>A portfolio you explore instead of scroll. Each node is a part of my story — <b>drag them, click to open, or hit ▶ traverse</b> to watch a breadth-first search sweep the whole graph.</p>
    <p>B.Tech Computer Science undergrad working across <b>machine learning, GenAI, algorithms, and systems</b>. Start anywhere.</p>
    <a class="ghbtn ghost" href="${GH}" target="_blank" rel="noopener">⌥ View GitHub ↗</a>`},
  about:{k:'about',t:'Messy inputs → <span class="accent">clean decisions</span>',h:`
    <p>Third-year B.Tech Computer Science student at <b>SRM Institute of Science and Technology</b>. My favorite work is where theory meets something running — a classifier I trust, a RAG pipeline that answers correctly, or traversal code that finds the path.</p>
    <div class="facts">
      <div class="r"><span class="kk">focus</span><span class="vv">ML · GenAI · DSA · Systems</span></div>
      <div class="r"><span class="kk">degree</span><span class="vv">B.Tech CSE · 2023–27</span></div>
      <div class="r"><span class="kk">gpa</span><span class="vv"><b>8.65</b> / 10.0</span></div>
      <div class="r"><span class="kk">based</span><span class="vv">Guntur, AP, India</span></div>
    </div>`},
  exp:{k:'experience',t:'Two internships, <span class="accent">two problem spaces</span>',h:`
    <p>From low-level C/C++ algorithm work to end-to-end machine-learning research. Open the connected nodes for details.</p>`},
  ncmu:{k:'experience · node',t:'Research Intern',h:`
    <div class="when">May – Jun 2025</div><div class="org">North Chiang Mai University · Thailand</div>
    <ul><li>Built an ML system predicting diabetes risk from patient health parameters.</li>
    <li>Developed a ReactJS interface for data input and result visualization.</li>
    <li>Ran preprocessing, feature selection, and evaluation to raise accuracy.</li>
    <li>Trained and analyzed models in Python with Scikit-learn.</li></ul>
    <div class="tags"><span>Python</span><span>Scikit-learn</span><span>ReactJS</span><span>ML</span></div>`},
  dsa:{k:'experience · node',t:'C / C++ &amp; DSA Intern',h:`
    <div class="when">Jan – Mar 2025</div><div class="org">Internship · Guntur, AP</div>
    <ul><li>Worked extensively in C and C++ on data structures and algorithms.</li>
    <li>Built up dynamic programming, graph theory, and OOP.</li>
    <li>Applied algorithmic problem-solving to optimize program efficiency.</li></ul>
    <div class="tags"><span>C</span><span>C++</span><span>DP</span><span>Graphs</span><span>OOP</span></div>`},
  work:{k:'work',t:'Selected <span class="accent">projects</span>',h:`
    <p>Five connected nodes. The two marked with a purple dot — <b>FAQFlow AI</b> and <b>NexusHome</b> — are live on GitHub with full code. Open any node to dig in.</p>
    <a class="ghbtn ghost" href="${GH}?tab=repositories" target="_blank" rel="noopener">⌥ Browse all repos ↗</a>`},
  faqflow:{k:'work · flagship',t:'FAQFlow <span class="accent">AI</span>',v:true,h:`
    <p>A RAG-powered SaaS that turns uploaded FAQ documents into an intelligent, embeddable support chatbot. Upload a PDF/DOCX/TXT and instantly get a chatbot trained on it.</p>
    <ul><li>Retrieval-Augmented Generation with OpenAI embeddings + GPT-4 Turbo and ChromaDB.</li>
    <li>Lightweight vanilla-JS widget that embeds on any website.</li>
    <li>Multi-tenant SaaS architecture with JWT auth and API keys.</li>
    <li>Full-stack: FastAPI + SQLAlchemy backend, Next.js + Tailwind frontend.</li></ul>
    <div class="tags"><span>FastAPI</span><span>Next.js</span><span>LangChain</span><span>OpenAI</span><span>ChromaDB</span><span>RAG</span></div>
    <a class="ghbtn" href="${GH}/GEN-AI" target="_blank" rel="noopener">⌥ View on GitHub ↗</a>`},
  nexus:{k:'work · flagship',t:'NexusHome',v:true,h:`
    <p>A voice-controlled smart-home automation system with a real-time web interface — control lights, thermostat, fan, TV, curtains, and security with natural-language commands.</p>
    <ul><li>Python voice assistant wired to a Flask + WebSockets backend for real-time updates.</li>
    <li>Scene support: Good Morning, Good Night, Leave Home, Entertainment Mode.</li>
    <li>Live activity feed logging every command and action.</li>
    <li>Responsive UI that works across desktop and mobile.</li></ul>
    <div class="tags"><span>Python</span><span>Flask</span><span>WebSockets</span><span>Voice</span><span>Real-time UI</span></div>
    <a class="ghbtn" href="${GH}/Smart-home-automation" target="_blank" rel="noopener">⌥ View on GitHub ↗</a>`},
  maze:{k:'work · node',t:'Maze Solver',h:`
    <p>A pathfinding app that explores a grid with <b>DFS and BFS</b> and computes the shortest valid route — stacks for depth-first descent, queues for breadth-first waves. The ▶ traverse button up top runs the same idea on this graph.</p>
    <div class="tags"><span>Python</span><span>BFS</span><span>DFS</span><span>Stacks &amp; Queues</span></div>`},
  fraud:{k:'work · node',t:'Credit Card Fraud Detection',h:`
    <p>A classifier separating fraudulent from legitimate transactions on a balanced dataset, comparing <b>Random Forest and SVM</b> — tuned to catch the cases that matter most.</p>
    <div class="metric"><span class="n">100%</span><span class="c">recall<br>(Random Forest)</span></div>
    <div class="tags"><span>Python</span><span>Scikit-learn</span><span>Random Forest</span><span>SVM</span></div>`},
  power:{k:'work · node',t:'PowerMonitor',h:`
    <p>An Android app tracking real-time battery usage and app activity, using background services for continuous monitoring and analytics to surface power-hungry apps.</p>
    <div class="metric"><span class="n">24/7</span><span class="c">background<br>monitoring</span></div>
    <div class="tags"><span>Java</span><span>Android SDK</span><span>SQLite</span></div>`},
  stack:{k:'stack',t:'Tools I <span class="accent">reach for</span>',h:`<p>Open <b>languages</b>, <b>tech</b>, or <b>concepts</b> for the full set.</p>`},
  langs:{k:'stack · node',t:'Languages',h:`<div class="tags"><span>C</span><span>C++</span><span>Python</span><span>Java</span><span>JavaScript</span></div>`},
  tech:{k:'stack · node',t:'Technologies',h:`<div class="tags"><span>Scikit-learn</span><span>ReactJS</span><span>Next.js</span><span>FastAPI</span><span>Flask</span><span>LangChain</span><span>ChromaDB</span><span>MySQL</span><span>Git</span></div>`},
  concepts:{k:'stack · node',t:'Core concepts',h:`<div class="tags"><span>DSA</span><span>OOP</span><span>Machine Learning</span><span>RAG / GenAI</span><span>NLP</span><span>Operating Systems</span></div>`},
  contact:{k:'contact',t:'Let\'s find the <span class="accent">path</span>',h:`
    <p>Open to internships and collaboration in ML, GenAI, and software engineering. Email is the fastest route.</p>
    <div class="clinks">
      <a class="clink" href="mailto:addagirispoorthi@gmail.com"><span class="ic">✉</span> addagirispoorthi@gmail.com</a>
      <a class="clink" href="${LI}" target="_blank" rel="noopener"><span class="ic">in</span> linkedin.com/in/addagiri-spoorthi</a>
      <a class="clink" href="${GH}" target="_blank" rel="noopener"><span class="ic">⌥</span> github.com/addagirigopikaspurthi</a>
      <a class="clink" href="tel:+918977938436"><span class="ic">☎</span> +91 89779 38436</a>
    </div>`},
};

const byId={};NODES.forEach(n=>byId[n.id]=n);
const adj={};NODES.forEach(n=>adj[n.id]=[]);
LINKS.forEach(([a,b])=>{adj[a].push(b);adj[b].push(a);});

let W=innerWidth,H=innerHeight;
function seed(){
  const cx=W/2,cy=H/2;
  byId.root.x=cx;byId.root.y=cy;
  const cats=NODES.filter(n=>n.type==='cat');
  cats.forEach((n,i)=>{const a=(i/cats.length)*Math.PI*2-Math.PI/2;n.x=cx+Math.cos(a)*190;n.y=cy+Math.sin(a)*190;});
  NODES.filter(n=>n.type==='leaf').forEach(n=>{const pa=byId[adj[n.id][0]];n.x=pa.x+(Math.random()-.5)*130;n.y=pa.y+(Math.random()-.5)*130;});
  NODES.forEach(n=>{n.vx=0;n.vy=0;});
}
seed();

let tx=0,ty=0,k=1;
const gRoot=document.createElementNS(NS,'g');gRoot.id='gRoot';SVG.appendChild(gRoot);
function applyT(){gRoot.setAttribute('transform',`translate(${tx},${ty}) scale(${k})`);}
applyT();

const edgeEls=LINKS.map(([a,b])=>{const l=document.createElementNS(NS,'line');l.setAttribute('class','edge');l.dataset.a=a;l.dataset.b=b;gRoot.appendChild(l);return l;});
const nodeEls={};
NODES.forEach(n=>{
  const g=document.createElementNS(NS,'g');
  g.setAttribute('class','node '+n.type);g.setAttribute('tabindex','0');g.setAttribute('role','button');g.setAttribute('aria-label',n.label+' — open');
  const ring=document.createElementNS(NS,'circle');ring.setAttribute('class','ring');ring.setAttribute('r',n.r+7);
  const c=document.createElementNS(NS,'circle');c.setAttribute('class','core');c.setAttribute('r',n.r);
  const fill=n.type==='root'?'var(--root)':n.type==='cat'?'#12203c':'#0e1830';
  const stroke=n.type==='root'?'var(--root)':n.type==='cat'?'var(--explore)':(n.gh?'var(--gh)':'var(--path)');
  c.setAttribute('fill',fill);c.setAttribute('stroke',stroke);c.setAttribute('stroke-width',n.type==='leaf'?1.7:2);
  g.appendChild(ring);g.appendChild(c);
  if(n.gh){const b=document.createElementNS(NS,'circle');b.setAttribute('class','gh-badge');b.setAttribute('r',5);b.setAttribute('cx',n.r*0.72);b.setAttribute('cy',-n.r*0.72);g.appendChild(b);}
  const t=document.createElementNS(NS,'text');t.textContent=n.label;if(n.type==='leaf')t.setAttribute('fill','#DfE4F2');
  g.appendChild(t);gRoot.appendChild(g);nodeEls[n.id]=g;
  g.addEventListener('click',()=>{if(!dragMoved)openNode(n.id);});
  g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openNode(n.id);}});
  g.addEventListener('pointerdown',e=>startDragNode(e,n));
  g.addEventListener('mouseenter',()=>hoverNode(n.id,true));
  g.addEventListener('mouseleave',()=>hoverNode(n.id,false));
});

let panelOpen=false;
function hoverNode(id,on){
  if(panelOpen)return;
  nodeEls[id].classList.toggle('hovered',on);
  edgeEls.forEach(l=>{if(l.dataset.a===id||l.dataset.b===id)l.classList.toggle('near',on);});
}

function tick(){
  const cx=W/2,cy=H/2;
  for(let i=0;i<NODES.length;i++){
    const a=NODES[i];if(a===dragNode)continue;let fx=0,fy=0;
    for(let j=0;j<NODES.length;j++){if(i===j)continue;const b=NODES[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||0.01,d=Math.sqrt(d2);const rep=9500/d2;fx+=dx/d*rep;fy+=dy/d*rep;}
    fx+=(cx-a.x)*0.008;fy+=(cy-a.y)*0.008;
    a.vx=(a.vx+fx)*0.82;a.vy=(a.vy+fy)*0.82;
  }
  LINKS.forEach(([s,t])=>{const a=byId[s],b=byId[t];let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||.01;const rest=(a.type==='root'||b.type==='root')?175:120;const f=(d-rest)*0.02,ux=dx/d,uy=dy/d;if(a!==dragNode){a.vx+=ux*f;a.vy+=uy*f;}if(b!==dragNode){b.vx-=ux*f;b.vy-=uy*f;}});
  NODES.forEach(n=>{if(n===dragNode)return;n.x+=n.vx*0.25;n.y+=n.vy*0.25;});
  render();
}
function render(){
  edgeEls.forEach(l=>{const a=byId[l.dataset.a],b=byId[l.dataset.b];l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);});
  NODES.forEach(n=>nodeEls[n.id].setAttribute('transform',`translate(${n.x},${n.y})`));
}
let raf;
function loop(){tick();raf=requestAnimationFrame(loop);}
if(REDUCE){for(let i=0;i<280;i++)tick();render();}else loop();
requestAnimationFrame(()=>gRoot.classList.add('ready'));

let dragNode=null,dragMoved=false,dragOff={x:0,y:0};
function screenToWorld(px,py){return{x:(px-tx)/k,y:(py-ty)/k};}
function startDragNode(e,n){
  e.stopPropagation();dragNode=n;dragMoved=false;
  const w=screenToWorld(e.clientX,e.clientY);dragOff={x:w.x-n.x,y:w.y-n.y};
  try{nodeEls[n.id].setPointerCapture(e.pointerId);}catch(_){}
  const mv=ev=>{const w=screenToWorld(ev.clientX,ev.clientY);n.x=w.x-dragOff.x;n.y=w.y-dragOff.y;n.vx=n.vy=0;dragMoved=true;if(REDUCE)render();};
  const up=()=>{dragNode=null;nodeEls[n.id].removeEventListener('pointermove',mv);nodeEls[n.id].removeEventListener('pointerup',up);setTimeout(()=>dragMoved=false,0);};
  nodeEls[n.id].addEventListener('pointermove',mv);
  nodeEls[n.id].addEventListener('pointerup',up);
}

const stage=document.getElementById('stage');
let panning=false,panStart={x:0,y:0},tStart={x:0,y:0};
stage.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;panning=true;stage.classList.add('grabbing');panStart={x:e.clientX,y:e.clientY};tStart={x:tx,y:ty};});
addEventListener('pointermove',e=>{if(!panning)return;tx=tStart.x+(e.clientX-panStart.x);ty=tStart.y+(e.clientY-panStart.y);applyT();});
addEventListener('pointerup',()=>{panning=false;stage.classList.remove('grabbing');});
function zoomAt(factor){const cx=W/2,cy=H/2,wx=(cx-tx)/k,wy=(cy-ty)/k;k=Math.max(.5,Math.min(2.2,k*factor));tx=cx-wx*k;ty=cy-wy*k;applyT();}
document.getElementById('zin').onclick=()=>zoomAt(1.2);
document.getElementById('zout').onclick=()=>zoomAt(1/1.2);
stage.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY<0?1.08:1/1.08);},{passive:false});
document.getElementById('resetBtn').onclick=()=>{tx=0;ty=0;k=1;applyT();seed();if(REDUCE){for(let i=0;i<280;i++)tick();render();}};

const panel=document.getElementById('panel'),panelBody=document.getElementById('panelBody'),scrim=document.getElementById('scrim');
let lastFocus=null;
function openNode(id){
  const data=CONTENT[id];if(!data)return;
  const badge=data.v?'<div class="verified">✔ verified · live on GitHub</div>':'';
  panelBody.innerHTML=`<div class="panel-kicker"><span class="k-dot"></span>${data.k}</div><h2 id="panelTitle">${data.t}</h2>${badge}${data.h}`;
  panel.classList.add('open');scrim.classList.add('on');panelOpen=true;
  NODES.forEach(n=>{const near=n.id===id||adj[id].includes(n.id);nodeEls[n.id].classList.toggle('dim',!near);nodeEls[n.id].classList.remove('hovered');});
  edgeEls.forEach(l=>l.classList.toggle('near',l.dataset.a===id||l.dataset.b===id));
  lastFocus=document.activeElement;document.getElementById('panelClose').focus();
}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('on');panelOpen=false;NODES.forEach(n=>nodeEls[n.id].classList.remove('dim'));edgeEls.forEach(l=>l.classList.remove('near'));if(lastFocus&&lastFocus.focus)lastFocus.focus();}
document.getElementById('panelClose').onclick=closePanel;
scrim.onclick=()=>{closePanel();closeMenu();};
addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeMenu();}});

let traversing=false;
function runTraverse(){
  if(traversing)return;traversing=true;
  edgeEls.forEach(l=>l.classList.remove('lit'));NODES.forEach(n=>nodeEls[n.id].classList.remove('lit'));
  const q=['root'],seen={root:true},order=[],usedEdge={};
  while(q.length){const cur=q.shift();order.push(cur);adj[cur].forEach(nb=>{if(!seen[nb]){seen[nb]=true;usedEdge[nb]=cur;q.push(nb);}});}
  let i=0;
  const step=()=>{
    if(i>=order.length){traversing=false;setTimeout(()=>{NODES.forEach(n=>nodeEls[n.id].classList.remove('lit'));edgeEls.forEach(l=>l.classList.remove('lit'));},1400);return;}
    const id=order[i];nodeEls[id].classList.add('lit');
    if(usedEdge[id]!==undefined){const p=usedEdge[id];edgeEls.forEach(l=>{if((l.dataset.a===p&&l.dataset.b===id)||(l.dataset.b===p&&l.dataset.a===id))l.classList.add('lit');});}
    i++;setTimeout(step,REDUCE?50:250);
  };
  step();
}
document.getElementById('traverseBtn').onclick=runTraverse;

const a11yList=document.getElementById('a11yList'),a11y=document.getElementById('a11y');
NODES.forEach(n=>{const b=document.createElement('button');b.textContent=(n.type==='leaf'?'   ↳ ':'')+n.label+(n.gh?'  ⌥':'');b.onclick=()=>{openNode(n.id);closeMenu();};a11yList.appendChild(b);});
function openMenu(){a11y.classList.add('open');scrim.classList.add('on');}
function closeMenu(){a11y.classList.remove('open');if(!panelOpen)scrim.classList.remove('on');}
document.getElementById('menuBtn').onclick=()=>{a11y.classList.contains('open')?closeMenu():openMenu();};

addEventListener('resize',()=>{W=innerWidth;H=innerHeight;});

if(!REDUCE)setTimeout(()=>{if(!panelOpen&&!traversing)runTraverse();},1100);
</script>
</body>
</html>
